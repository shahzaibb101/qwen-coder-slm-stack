global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # vLLM server-side metrics (TTFT, e2e latency, tokens/sec, KV cache, queue depth).
  # These histograms are measured inside the server, so latency panels stay honest
  # even when load is generated over a WAN link.
  - job_name: vllm
    metrics_path: /metrics
    # Split mode — vLLM on a remote pod via RunPod's HTTPS proxy. Swap in your
    # pod id. (Note: Prometheus normalizes vLLM's "vllm:"-prefixed metric names
    # to "vllm_" on ingest — the dashboard queries use the underscore form.)
    scheme: https
    static_configs:
      - targets:
          - "<POD_ID>-8000.proxy.runpod.net:443"
    # Full-stack mode (compose gpu profile): scheme http, target "vllm:8000"

  # GPU utilization / memory / power from scripts/gpu_metrics_exporter.py
  # (runs next to vLLM on the GPU host).
  - job_name: gpu
    metrics_path: /metrics
    scheme: https
    static_configs:
      - targets:
          - "<POD_ID>-9835.proxy.runpod.net:443"
    # Full-stack mode: scheme http, target "vllm:9835"
